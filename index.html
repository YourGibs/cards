<!DOCTYPE html><html><body><h1>Viewer Cards</h1>
<ul id="cards"></ul>
<script>
for(let i=1;i<=50;i++) {
  let num = i.toString().padStart(3,'0');
  document.getElementById('cards').innerHTML += `<li><img src="/${num}*.png" width="100" onerror="this.src='https://raw.githubusercontent.com/yourgibs/cards/main/Gen1/${num}*.png'"></li>`;
}
</script></body></html>
